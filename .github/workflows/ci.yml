name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Python tests
        id: python_tests
        continue-on-error: true
        env:
          LIVE: "false"
          WEALTHMACHINE_MODE: "mock"
        run: pytest -q > python-test.log 2>&1

      - name: Upload Python test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daleobanks-python-test-log
          path: python-test.log
          if-no-files-found: error

      - name: Report Python test failure
        if: steps.python_tests.outcome == 'failure'
        run: |
          tail -n 250 python-test.log
          exit 1

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build web application
        run: npm run build
